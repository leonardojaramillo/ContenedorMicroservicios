apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-audit
spec:
  selector: { app: elasticsearch-audit }
  ports: [{ port: 9200, targetPort: 9200 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-audit
spec:
  replicas: 1
  selector: { matchLabels: { app: elasticsearch-audit } }
  template:
    metadata: { labels: { app: elasticsearch-audit } }
    spec:
      containers:
        - name: elasticsearch-audit
          image: docker.elastic.co/elasticsearch/elasticsearch:9.2.3
          ports: [{ containerPort: 9200 }]
          env:
            - { name: discovery.type, value: single-node }
            - { name: xpack.security.enabled, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
---
