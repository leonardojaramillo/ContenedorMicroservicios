apiVersion: v1
kind: Service
metadata:
  name: mysql-purchase
spec:
  selector: { app: mysql-purchase }
  ports: [{ port: 3306, targetPort: 3306 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-purchase
spec:
  replicas: 1
  selector: { matchLabels: { app: mysql-purchase } }
  template:
    metadata: { labels: { app: mysql-purchase } }
    spec:
      containers:
        - name: mysql-purchase
          image: mysql:8
          ports: [{ containerPort: 3306 }]
          env:
            - { name: MYSQL_DATABASE, value: purchase_db }
            - { name: MYSQL_ROOT_PASSWORD, value: root }
            - { name: MYSQL_USER, value: purchase_user }
            - { name: MYSQL_PASSWORD, value: purchase_pass }
---
