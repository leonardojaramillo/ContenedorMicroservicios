# ============ AUTH SERVICE ============
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector: { app: auth-service }
  ports: [{ port: 8081, targetPort: 8081 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: auth-service
          image: grapevine/auth-service
          imagePullPolicy: Never
          ports: [{ containerPort: 8081 }]
          env:
            - { name: SPRING_CONFIG_IMPORT, value: "optional:configserver:http://config-server:8888" }
            - { name: EUREKA_URI, value: "http://discovery-service:8761/eureka/" }
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres-auth:5432/auth_db" }
            - { name: SPRING_DATASOURCE_USERNAME, value: "postgres" }
            - { name: SPRING_DATASOURCE_PASSWORD, value: "postgres" }
            - { name: JWT_SECRET, value: "una-clave-secreta-larga-y-aleatoria-para-firmar-tokens-1234567890" }
            - { name: SPRING_MAIL_HOST, value: "smtp.gmail.com" }
            - { name: SPRING_MAIL_PORT, value: "587" }
            - { name: SPRING_MAIL_USERNAME, value: "test@example.com" }
            - { name: SPRING_MAIL_PASSWORD, value: "fakepassword" }
            - { name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH, value: "true" }
            - { name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE, value: "true" }

